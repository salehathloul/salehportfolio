<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>معاينة صفحة كلمة المرور</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
    }

    .container {
      width: 100%;
      max-width: 360px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: #e5e5e5;
      text-transform: uppercase;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: #333;
    }

    .label {
      font-size: 0.8rem;
      color: #666;
      letter-spacing: 0.05em;
      text-align: center;
    }

    .input-wrap {
      width: 100%;
      position: relative;
    }

    input[type="password"] {
      width: 100%;
      padding: 0.875rem 1rem;
      background: #141414;
      border: 1px solid #222;
      border-radius: 6px;
      color: #fff;
      font-size: 1rem;
      letter-spacing: 0.2em;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
      direction: ltr;
    }

    input[type="password"]:focus {
      border-color: #444;
    }

    input[type="password"]::placeholder {
      letter-spacing: 0.05em;
      color: #444;
      font-size: 0.85rem;
    }

    button {
      width: 100%;
      padding: 0.875rem;
      background: #fff;
      color: #0a0a0a;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }

    .error {
      font-size: 0.8rem;
      color: #e55;
      text-align: center;
      min-height: 1.2rem;
    }

    /* -- LIGHT MODE TOGGLE (just for preview) -- */
    .toggle {
      position: fixed;
      top: 1rem;
      left: 1rem;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #888;
      font-size: 0.75rem;
      padding: 0.4rem 0.75rem;
      border-radius: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <button class="toggle" onclick="toggleTheme()">🌙 تبديل الوضع</button>

  <div class="container">

    <div class="logo">صالح الهذلول</div>

    <div class="divider"></div>

    <p class="label">الموقع في مرحلة الإعداد — أدخل كلمة المرور للمعاينة</p>

    <div class="input-wrap">
      <input type="password" id="pw" placeholder="كلمة المرور" autofocus />
    </div>

    <div class="error" id="err"></div>

    <button onclick="check()">دخول</button>

  </div>

  <script>
    function check() {
      const val = document.getElementById('pw').value;
      const err = document.getElementById('err');
      if (val === '123123') {
        err.style.color = '#5a5';
        err.textContent = '✓ كلمة المرور صحيحة — سيتم توجيهك للموقع';
      } else {
        err.style.color = '#e55';
        err.textContent = 'كلمة المرور غير صحيحة، حاول مجدداً';
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
      }
    }

    document.getElementById('pw').addEventListener('keydown', e => {
      if (e.key === 'Enter') check();
    });

    let dark = true;
    function toggleTheme() {
      dark = !dark;
      document.body.style.background = dark ? '#0a0a0a' : '#f5f5f5';
      document.body.style.color = dark ? '#fff' : '#0a0a0a';
      document.querySelector('.toggle').textContent = dark ? '🌙 تبديل الوضع' : '☀️ تبديل الوضع';
    }
  </script>

</body>
</html>
